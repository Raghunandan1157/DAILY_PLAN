<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NLPL OrgPortal - Moved</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    a.btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a.btn:hover { background: #1d4ed8; }
    .url { font-size: 12px; color: #999; margin-top: 16px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128204;</div>
    <h1>This Website Has Moved</h1>
    <p>NLPL OrgPortal has been updated and moved to a new address. Please use the link below to access the latest version.</p>
    <a class="btn" href="https://raghunandan1157.github.io/Daily_Plan_Neon/">Go to Updated Website</a>
    <div class="url">https://raghunandan1157.github.io/Daily_Plan_Neon/</div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
      caches.keys().then(k => k.forEach(c => caches.delete(c)));
    }
  </script>
</body>
</html>
